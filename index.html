<!DOCTYPE html>
<html>
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@tonconnect/sdk@1.0.0/dist/tonconnect-sdk.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; }
    #coins { font-size: 4em; margin: 20px; cursor: pointer; transition: transform 0.1s; }
    #coins:active { transform: scale(0.95); }
    button { background: #00d4aa; border: none; padding: 15px 30px; border-radius: 25px; font-size: 1.2em; margin: 10px; cursor: pointer; }
    #balance { font-size: 2em; margin: 20px; }
  </style>
</head>
<body>
  <h1>TAPTON Game 🚀</h1>
  <div id="balance">Баланс: <span id="tapCount">0</span> $TAPTON</div>
  <div id="coins">🪙</div>
  <button onclick="claimAirdrop()">Airdrop TON (0.01)</button>
  <button onclick="upgrade()">Улучшить (+2x)</button>
  <div id="connectBtn"></div>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    let tapCount = localStorage.getItem('tapCount') || 0;
    let multiplier = 1;
    document.getElementById('tapCount').innerText = tapCount;

    // Клик по монете
    document.getElementById('coins').onclick = () => {
      tapCount = parseInt(tapCount) + multiplier;
      document.getElementById('tapCount').innerText = tapCount;
      localStorage.setItem('tapCount', tapCount);
    };

    // Улучшение
    function upgrade() {
      if (tapCount >= 100) {
        tapCount -= 100;
        multiplier += 1;
        alert(`Множитель: x${multiplier}`);
        updateUI();
      }
    }

    // TON Connect для airdrop
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: 'https://your-site.com/tonconnect-manifest.json' // Создай позже
    });

    function claimAirdrop() {
      if (tapCount >= 1000) {
        // Отправка 0.01 TON на кошелёк
        const transaction = {
          validUntil: Math.floor(Date.now() / 1000) + 300,
          messages: [{
            address: Telegram.WebApp.initDataUnsafe.user.id + '@wallet', // Твой wallet
            amount: '10000000', // 0.01 TON
            payload: 'TAPTON Airdrop!'
          }]
        };
        tonConnectUI.sendTransaction(transaction);
      } else {
        alert('Набери 1000 $TAPTON для airdrop!');
      }
    }

    function updateUI() {
      document.getElementById('tapCount').innerText = tapCount;
      localStorage.setItem('tapCount', tapCount);
    }
  </script>
</body>
</html>
