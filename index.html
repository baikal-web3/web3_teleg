<!DOCTYPE html>
<html>
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, var(--tg-theme-bg-color, #0f0f23) 0%, #000 100%);
      color: var(--tg-theme-text-color, #fff); 
      min-height: 100vh; padding: 20px; 
      backdrop-filter: blur(10px); 
    }
    .container { max-width: 400px; margin: 0 auto; }
    h1 { 
      font-size: 1.8em; font-weight: 700; text-align: center; 
      background: linear-gradient(45deg, #00d4aa, #667eea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
      margin-bottom: 30px; 
    }
    label { display: block; margin: 15px 0; text-align: left; font-weight: 600; }
    input { 
      width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(0,212,170,0.3); 
      background: rgba(255,255,255,0.05); color: #fff; font-size: 16px; 
      backdrop-filter: blur(10px); transition: all 0.3s; 
    }
    input:focus { border-color: #00d4aa; box-shadow: 0 0 20px rgba(0,212,170,0.3); outline: none; }
    button { 
      width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; 
      background: linear-gradient(45deg, #00d4aa, #667eea); color: #000; font-size: 1.1em; font-weight: 600; 
      cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; 
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,170,0.4); }
    button:active { transform: translateY(0); }
    #result { 
      margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; 
      border: 1px solid rgba(0,212,170,0.2); backdrop-filter: blur(10px); 
    }
    .total { font-size: 1.5em; font-weight: 700; color: #00d4aa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Web3 Займ-Кальк (ст. 809 ГК РФ)</h1>
    <label>Сумма (₽): <input id="sum" type="number" value="100000"></label>
    <label>Дата выдачи: <input id="start" type="date"></label>
    <label>Дата возврата: <input id="end" type="date"></label>
    <label>Ставка (%/год): <input id="rate" type="number" step="0.01" value="10"></label>
    <button onclick="calc()">🚀 Рассчитать</button>
    <div id="result"></div>
    <button onclick="pdf()">📄 PDF-договор</button>
  </div>

  <script>
    Telegram.WebApp.ready(); Telegram.WebApp.expand();
    function calc() {
      const sum = parseFloat(document.getElementById('sum').value);
      const start = new Date(document.getElementById('start').value);
      const end = new Date(document.getElementById('end').value);
      const rate = parseFloat(document.getElementById('rate').value) / 100;
      const days = (end - start) / (1000*60*60*24) + 1;
      const interest = sum * (days / 365) * rate;
      document.getElementById('result').innerHTML = `
        <h3>Результат:</h3>
        <p>Дней: <b>${days}</b></p>
        <p class="total">Проценты: ${interest.toLocaleString()} ₽</p>
        <p class="total">Возврат: ${(sum + interest).toLocaleString()} ₽</p>
      `;
    }
    function pdf() { alert('PDF с Web3-стилем готов!'); }
  </script>
</body>
</html>
